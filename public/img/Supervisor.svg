<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="supervisorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background circle -->
    <circle cx="100" cy="100" r="90" fill="url(#supervisorGradient)" opacity="0.1"/>
    
    <!-- Main supervisor figure -->
    <g transform="translate(100,100)">
        <!-- Head -->
        <circle cx="0" cy="-35" r="18" fill="url(#supervisorGradient)" opacity="0.8"/>
        
        <!-- Body -->
        <rect x="-12" y="-15" width="24" height="35" rx="3" fill="url(#supervisorGradient)" opacity="0.7"/>
        
        <!-- Arms -->
        <rect x="-25" y="-10" width="12" height="3" rx="1.5" fill="url(#supervisorGradient)" opacity="0.7"/>
        <rect x="13" y="-10" width="12" height="3" rx="1.5" fill="url(#supervisorGradient)" opacity="0.7"/>
        
        <!-- Clipboard/Document in left hand -->
        <rect x="-30" y="-18" width="8" height="12" rx="1" fill="#ffffff" stroke="url(#supervisorGradient)" stroke-width="1"/>
        <line x1="-28" y1="-15" x2="-24" y2="-15" stroke="url(#supervisorGradient)" stroke-width="0.8"/>
        <line x1="-28" y1="-12" x2="-24" y2="-12" stroke="url(#supervisorGradient)" stroke-width="0.8"/>
        <line x1="-28" y1="-9" x2="-24" y2="-9" stroke="url(#supervisorGradient)" stroke-width="0.8"/>
        
        <!-- Legs -->
        <rect x="-8" y="20" width="6" height="20" rx="3" fill="url(#supervisorGradient)" opacity="0.6"/>
        <rect x="2" y="20" width="6" height="20" rx="3" fill="url(#supervisorGradient)" opacity="0.6"/>
        
        <!-- Badge/Star on chest -->
        <polygon points="-2,-5 0,-10 2,-5 7,-5 3,-1 5,4 0,1 -5,4 -3,-1 -7,-5" 
                fill="#ffd700" stroke="url(#supervisorGradient)" stroke-width="0.5"/>
    </g>
    
    <!-- Title -->
    <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#supervisorGradient)">
        SUPERVISOR
    </text>
</svg>