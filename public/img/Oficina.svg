<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="oficinaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background circle -->
    <circle cx="100" cy="100" r="90" fill="url(#oficinaGradient)" opacity="0.1"/>
    
    <!-- Building structure -->
    <g transform="translate(100,100)">
        <!-- Main building -->
        <rect x="-40" y="-20" width="80" height="60" rx="4" fill="url(#oficinaGradient)" opacity="0.8"/>
        
        <!-- Roof -->
        <polygon points="-45,-25 0,-35 45,-25 40,-20 -40,-20" fill="url(#oficinaGradient)" opacity="0.9"/>
        
        <!-- Windows row 1 -->
        <rect x="-30" y="-10" width="12" height="8" rx="1" fill="#ffffff" opacity="0.9"/>
        <rect x="-10" y="-10" width="12" height="8" rx="1" fill="#ffffff" opacity="0.9"/>
        <rect x="10" y="-10" width="12" height="8" rx="1" fill="#ffffff" opacity="0.9"/>
        
        <!-- Windows row 2 -->
        <rect x="-30" y="5" width="12" height="8" rx="1" fill="#ffffff" opacity="0.9"/>
        <rect x="-10" y="5" width="12" height="8" rx="1" fill="#ffffff" opacity="0.9"/>
        <rect x="10" y="5" width="12" height="8" rx="1" fill="#ffffff" opacity="0.9"/>
        
        <!-- Main door -->
        <rect x="-8" y="20" width="16" height="20" rx="2" fill="#8b5cf6" opacity="0.8"/>
        <circle cx="4" cy="30" r="1.5" fill="#ffd700"/>
        
        <!-- Window frames -->
        <g stroke="url(#oficinaGradient)" stroke-width="0.5" fill="none">
            <!-- Vertical lines -->
            <line x1="-24" y1="-10" x2="-24" y2="-2"/>
            <line x1="-4" y1="-10" x2="-4" y2="-2"/>
            <line x1="16" y1="-10" x2="16" y2="-2"/>
            <line x1="-24" y1="5" x2="-24" y2="13"/>
            <line x1="-4" y1="5" x2="-4" y2="13"/>
            <line x1="16" y1="5" x2="16" y2="13"/>
            
            <!-- Horizontal lines -->
            <line x1="-30" y1="-6" x2="-18" y2="-6"/>
            <line x1="-10" y1="-6" x2="2" y2="-6"/>
            <line x1="10" y1="-6" x2="22" y2="-6"/>
            <line x1="-30" y1="9" x2="-18" y2="9"/>
            <line x1="-10" y1="9" x2="2" y2="9"/>
            <line x1="10" y1="9" x2="22" y2="9"/>
        </g>
        
        <!-- Office sign -->
        <rect x="-15" y="-45" width="30" height="8" rx="2" fill="#ffffff" stroke="url(#oficinaGradient)" stroke-width="1"/>
        <text x="0" y="-38" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="url(#oficinaGradient)">
            OFICINA
        </text>
    </g>
    
    <!-- Title -->
    <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#oficinaGradient)">
        OFICINA
    </text>
</svg>